function useFadeIn(delay = 0) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return visible;
}

        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        color: WHITE,
        fontWeight: 900,
        fontSize: s * 0.4,
        fontFamily,
        boxShadow: `0 4px 14px ${PINK_GLOW}`,
        flexShrink: 0
      }}>
        FS
      </div>);

  }
  return <span style={{ fontSize: size }}>{icon}</span>;
}

function FadeIn({ delay = 0, children, style = {} }) {
  const visible = useFadeIn(delay);
  return (
    <div
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(24px)",
        transition: "opacity 0.7s ease, transform 0.7s ease",
        ...style
      }}>
      
      {children}
    </div>);

}

// ─── CHANGE THIS to your Cloudflare Worker URL after deploying the proxy ───
const NOTION_PROXY = "https://notion-proxy.ryhanhusainni.workers.dev";
const NOTION_DB = "2aaa7f71c20a4d66ac6ed4efbc6bb7e9";

function BlogPage() {
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(false);
  const [selectedPost, setSelectedPost] = useState(null);
  const [postContent, setPostContent] = useState("");
  const [loadingContent, setLoadingContent] = useState(false);

  useEffect(() => {
    fetchPosts();
  }, []);

  const fetchPosts = async () => {
    try {
      const res = await fetch(`${NOTION_PROXY}/v1/databases/${NOTION_DB}/query`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          filter: {
            property: "Status",
            select: { equals: "Published" }
          },
          sorts: [{ property: "Date", direction: "descending" }]
        })
      });
      const data = await res.json();
      if (data.results) {
        setPosts(data.results);
      } else {
        setError(true);
      }
    } catch (err) {
      setError(true);
    }
    setLoading(false);
  };

  const fetchPostContent = async (pageId) => {
    setLoadingContent(true);
    try {
      const res = await fetch(`${NOTION_PROXY}/v1/blocks/${pageId}/children?page_size=100`, {
        headers: {
          "Content-Type": "application/json"
        }
      });
      const data = await res.json();
      if (data.results) {
        setPostContent(data.results);
      }
    } catch (err) {
      setPostContent([]);
    }
    setLoadingContent(false);
  };

  const getTitle = (page) => {
    const titleProp = page.properties.Title || page.properties.Name || Object.values(page.properties).find((p) => p.type === "title");
    if (titleProp && titleProp.title && titleProp.title.length > 0) {
      return titleProp.title.map((t) => t.plain_text).join("");
    }
    return "Untitled";
  };

  const getSummary = (page) => {
    const prop = page.properties.Summary;
    if (prop && prop.rich_text && prop.rich_text.length > 0) {
      return prop.rich_text.map((t) => t.plain_text).join("");
    }
    return "";
  };

  const getDate = (page) => {
    const prop = page.properties.Date;
    if (prop && prop.date && prop.date.start) {
      return new Date(prop.date.start).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    }
    return "";
  };

  const getTag = (page) => {
    const prop = page.properties.Tag;
    if (prop && prop.select) return prop.select.name;
    if (prop && prop.multi_select && prop.multi_select.length > 0) return prop.multi_select.map((t) => t.name).join(", ");
    return "";
  };

  const renderBlock = (block) => {
    const key = block.id;
    const getText = (richText) => {
      if (!richText || richText.length === 0) return "";
      return richText.map((t, i) => {
        let text = t.plain_text;
        if (t.annotations.bold) text = <strong key={i}>{text}</strong>;
        if (t.annotations.italic) text = <em key={i}>{text}</em>;
        if (t.annotations.code) text = <code key={i} style={{ background: GREY_200, padding: "2px 6px", borderRadius: 4, fontSize: 13 }}>{text}</code>;
        return text;
      });
    };

    switch (block.type) {
      case "paragraph":
        const pText = getText(block.paragraph.rich_text);
        if (!pText || typeof pText === "string" && pText.trim() === "") return <div key={key} style={{ height: 12 }} />;
        return <p key={key} style={{ fontSize: 16, color: GREY_700, lineHeight: 1.8, fontFamily, margin: "0 0 16px" }}>{pText}</p>;
      case "heading_1":
        return <h1 key={key} style={{ fontSize: 28, fontWeight: 900, color: GREY_900, fontFamily, margin: "32px 0 16px" }}>{getText(block.heading_1.rich_text)}</h1>;
      case "heading_2":
        return <h2 key={key} style={{ fontSize: 22, fontWeight: 800, color: GREY_900, fontFamily, margin: "28px 0 12px" }}>{getText(block.heading_2.rich_text)}</h2>;
      case "heading_3":
        return <h3 key={key} style={{ fontSize: 18, fontWeight: 700, color: GREY_900, fontFamily, margin: "24px 0 8px" }}>{getText(block.heading_3.rich_text)}</h3>;
      case "bulleted_list_item":
        return <div key={key} style={{ display: "flex", gap: 12, marginBottom: 8 }}><span style={{ color: PINK, marginTop: 2 }}>•</span><span style={{ fontSize: 16, color: GREY_700, lineHeight: 1.7, fontFamily }}>{getText(block.bulleted_list_item.rich_text)}</span></div>;
      case "numbered_list_item":
        return <div key={key} style={{ display: "flex", gap: 12, marginBottom: 8 }}><span style={{ fontSize: 16, color: GREY_700, lineHeight: 1.7, fontFamily }}>{getText(block.numbered_list_item.rich_text)}</span></div>;
      case "quote":
        return <blockquote key={key} style={{ borderLeft: `4px solid ${PINK}`, paddingLeft: 20, margin: "20px 0", fontSize: 16, color: GREY_700, fontStyle: "italic", lineHeight: 1.7, fontFamily }}>{getText(block.quote.rich_text)}</blockquote>;
      case "divider":
        return <hr key={key} style={{ border: "none", borderTop: `1px solid ${GREY_200}`, margin: "24px 0" }} />;
      case "image":
        const imgUrl = block.image.type === "external" ? block.image.external.url : block.image.file.url;
        return <div key={key} style={{ margin: "24px 0" }}><img src={imgUrl} alt="" style={{ maxWidth: "100%", borderRadius: 12 }} /></div>;
      default:
        return null;
    }
  };

  // ─── Post Detail View ───
  if (selectedPost) {
    return (
      <div style={{ paddingTop: 68 }}>
        <Section>
          <div style={{ maxWidth: 740, margin: "0 auto" }}>
            <FadeIn delay={50}>
              <button
                onClick={() => {setSelectedPost(null);setPostContent("");}}
                style={{ background: "none", border: `2px solid ${GREY_200}`, borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily, color: GREY_700, marginBottom: 32, transition: "all 0.2s" }}
                onMouseEnter={(e) => {e.currentTarget.style.borderColor = PINK_GLOW;e.currentTarget.style.color = PINK;}}
                onMouseLeave={(e) => {e.currentTarget.style.borderColor = GREY_200;e.currentTarget.style.color = GREY_700;}}>
                
                ← Back to Insights
              </button>
            </FadeIn>

            <FadeIn delay={100}>
              <div style={{ marginBottom: 24 }}>
                {getTag(selectedPost) &&
                <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", color: PINK, background: PINK_LIGHT, padding: "4px 12px", borderRadius: 20, fontFamily }}>{getTag(selectedPost)}</span>
                }
              </div>
              <h1 style={{ fontSize: "clamp(28px, 4.5vw, 42px)", fontWeight: 900, color: GREY_900, margin: "0 0 12px", fontFamily, lineHeight: 1.2 }}>
                {getTitle(selectedPost)}
              </h1>
              <div style={{ fontSize: 14, color: GREY_500, fontFamily, marginBottom: 40 }}>{getDate(selectedPost)}</div>
            </FadeIn>

            <FadeIn delay={200}>
              {loadingContent ?
              <div style={{ textAlign: "center", padding: "40px 0", color: GREY_500, fontFamily }}>Loading article...</div> :

              <div>{Array.isArray(postContent) && postContent.map(renderBlock)}</div>
              }
            </FadeIn>
          </div>
        </Section>
      </div>);

  }

  // ─── Blog Listing ───
  return (
    <div style={{ paddingTop: 68 }}>
      <section
        style={{
          background: `linear-gradient(160deg, ${PINK_LIGHT}, ${PINK_GLOW}88)`,
          padding: "80px 24px",
          textAlign: "center"
        }}>
        
        <FadeIn>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2.5, textTransform: "uppercase", color: PINK, marginBottom: 16, fontFamily }}>
            Insights & Perspectives
          </div>
          <h1 style={{ fontSize: "clamp(30px, 5vw, 48px)", fontWeight: 900, color: GREY_900, margin: "0 0 20px", fontFamily }}>
            FS Insights
          </h1>
          <p style={{ fontSize: 18, color: GREY_700, maxWidth: 560, margin: "0 auto", lineHeight: 1.65, fontFamily }}>
            Thoughts on futures thinking, strategic planning, and building capability for an uncertain world.
          </p>
        </FadeIn>
      </section>

      <Section>
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          {loading ?
          <FadeIn>
              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={{ width: 40, height: 40, border: `3px solid ${GREY_200}`, borderTopColor: PINK, borderRadius: "50%", margin: "0 auto 16px", animation: "spin 0.8s linear infinite" }} />
                <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                <p style={{ color: GREY_500, fontFamily }}>Loading posts...</p>
              </div>
            </FadeIn> :
          error ?
          <FadeIn>
              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={{ fontSize: 40, marginBottom: 16 }}>📝</div>
                <p style={{ color: GREY_700, fontFamily, fontSize: 16 }}>Unable to load posts right now. Please try again later.</p>
              </div>
            </FadeIn> :
          posts.length === 0 ?
          <FadeIn>
              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={{ fontSize: 40, marginBottom: 16 }}>✍️</div>
                <h3 style={{ fontSize: 20, fontWeight: 800, color: GREY_900, margin: "0 0 8px", fontFamily }}>Coming Soon</h3>
                <p style={{ color: GREY_700, fontFamily, fontSize: 15 }}>We're working on our first posts. Check back soon.</p>
              </div>
            </FadeIn> :

          <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
              {posts.map((post, i) =>
            <FadeIn key={post.id} delay={100 + i * 80}>
                  <div
                onClick={() => {setSelectedPost(post);fetchPostContent(post.id);}}
                style={{
                  background: WHITE,
                  borderRadius: 20,
                  padding: "32px 36px",
                  border: `1px solid ${GREY_200}`,
                  cursor: "pointer",
                  transition: "all 0.3s"
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = PINK_GLOW;
                  e.currentTarget.style.boxShadow = `0 8px 32px rgba(255,8,127,0.08)`;
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = GREY_200;
                  e.currentTarget.style.boxShadow = "none";
                }}>
                
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
                      {getTag(post) &&
                  <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: PINK, background: PINK_LIGHT, padding: "4px 12px", borderRadius: 20, fontFamily }}>{getTag(post)}</span>
                  }
                      <span style={{ fontSize: 13, color: GREY_500, fontFamily }}>{getDate(post)}</span>
                    </div>
                    <h3 style={{ fontSize: 22, fontWeight: 800, color: GREY_900, margin: "0 0 8px", fontFamily, lineHeight: 1.3 }}>
                      {getTitle(post)}
                    </h3>
                    {getSummary(post) &&
                <p style={{ fontSize: 15, color: GREY_700, lineHeight: 1.6, margin: "0 0 16px", fontFamily }}>{getSummary(post)}</p>
                }
                    <span style={{ fontSize: 14, fontWeight: 700, color: PINK, fontFamily }}>Read more →</span>
                  </div>
                </FadeIn>
            )}
            </div>
          }
        </div>
      </Section>
    </div>);

}

// APP ROOT
// ════════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState(PAGES.HOME);
  const [activeCourseId, setActiveCourseId] = useState(null);

  const navigate = (p, courseId = null) => {
    setPage(p);
    setActiveCourseId(courseId);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const renderPage = () => {
    switch (page) {
      case PAGES.ABOUT:
        return <AboutPage />;
      case PAGES.COURSES:
        return <CoursesPage setPage={navigate} />;
      case PAGES.COURSE_DETAIL:
        return <CourseDetailPage courseId={activeCourseId} setPage={navigate} />;
      case PAGES.FOR_WHO:
        return <ForWhoPage setPage={navigate} />;
      case PAGES.BLOG:
        return <BlogPage />;
      case PAGES.CONTACT:
        return <ContactPage />;
      default:
        return <HomePage setPage={navigate} />;
    }
  };

  return (
    <div style={{ fontFamily, minHeight: "100vh", background: WHITE, color: GREY_900 }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; }
        body { margin: 0; padding: 0; }
        ::selection { background: ${PINK_GLOW}; color: ${GREY_900}; }
        @media (max-width: 768px) {
          .desktop-nav { display: none !important; }
          .mobile-menu-btn { display: block !important; }
        }
        @media (min-width: 769px) {
          .mobile-dropdown { display: none !important; }
        }
      `}</style>
      <Navbar page={page} setPage={navigate} />
      {renderPage()}
      <Footer setPage={navigate} />
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
